const fmt=new Intl.NumberFormat('vi-VN');
const qty=n=>fmt.format(Math.round(Number(n||0)));
const money=n=>fmt.format(Math.round(Number(n||0)))+'₫';
const pct=n=>(Number(n||0)).toLocaleString('vi-VN',{maximumFractionDigits:1})+'%';
const s=data.summary;
let currentView='compare';

function kpi(label,value,hint,tone='brand'){return `<div class="card kpi ${tone}"><div class="label">${label}</div><div class="value">${value}</div><div class="hint">${hint||''}</div></div>`}
const totalInventoryValue=s.main.tong_gia_ban+s.pos.tong_gia_ban;
const diffPct=Math.abs(s.diff_ton)/Math.max(s.main.ton+s.pos.ton,1)*100;
document.getElementById('kpis').innerHTML=[kpi('Tổng giá trị tồn',money(totalInventoryValue),'Kho Tổng MTB + Kho POS','brand'),kpi('% Lệch tồn',pct(diffPct),'Chênh tồn / tổng tồn hai kho','risk'),kpi('SKU cần nhập gấp',qty(s.pos_need_count),'POS đứt hàng nhưng Kho Tổng còn tồn','warn')].join('');
function whBox(x,type){return `<div class="whbox ${type}"><div class="whname">${x.kho}</div><div class="whstats"><div class="stat"><span>SKU</span><b>${qty(x.skus)}</b></div><div class="stat"><span>Tồn</span><b>${qty(x.ton)}</b></div><div class="stat"><span>Khả dụng</span><b>${qty(x.kha_dung)}</b></div><div class="stat"><span>Đã đặt</span><b>${qty(x.dat)}</b></div><div class="stat"><span>Chờ nhập</span><b>${qty(x.cho_nhap)}</b></div><div class="stat"><span>Giá bán tồn</span><b>${money(x.tong_gia_ban)}</b></div><div class="stat"><span>Lợi nhuận</span><b>${money(x.tong_loi_nhuan)}</b></div><div class="stat"><span>Khả dụng/Tồn</span><b>${pct(x.ty_le_kha_dung)}</b></div></div></div>`}
const warehouseSummaryEl=document.getElementById('warehouseSummary');if(warehouseSummaryEl)warehouseSummaryEl.innerHTML=whBox(s.main,'main')+whBox(s.pos,'pos');
function bars(el,items,max,colorClass=''){const target=document.getElementById(el);if(!target)return;target.innerHTML=items.map(x=>`<div class="barrow"><div class="barlabel" title="${x.label}">${x.label}</div><div class="bartrack"><div class="bar ${colorClass}" style="width:${Math.max(1,x.value/max*100)}%"></div></div><div class="barvalue num">${x.display}</div></div>`).join('')}
bars('stockBars',[{label:'Có tồn cả hai kho',value:s.overlap,display:qty(s.overlap)},{label:'Chỉ Kho Tổng có tồn',value:s.only_main,display:qty(s.only_main)},{label:'Chỉ Kho POS có tồn',value:s.only_pos,display:qty(s.only_pos)},{label:'Hết tồn cả hai',value:s.both_zero,display:qty(s.both_zero)}],Math.max(s.overlap,s.only_main,s.only_pos,s.both_zero,1));
bars('valueBars',[{label:'Kho Tổng MTB',value:s.main.tong_gia_ban,display:money(s.main.tong_gia_ban)},{label:'Kho POS MTB',value:s.pos.tong_gia_ban,display:money(s.pos.tong_gia_ban)}],Math.max(s.main.tong_gia_ban,s.pos.tong_gia_ban,1),'pos');
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function barChart(el,items,max){document.getElementById(el).innerHTML=`<div class="chartbars">${items.map(x=>`<div class="chartrow"><div class="chartlabel" title="${esc(x.label)}">${esc(x.label)}</div><div class="charttrack"><div class="chartfill ${x.cls||''}" style="width:${Math.max(1,Number(x.value||0)/max*100)}%"></div></div><div class="chartvalue">${x.display}</div></div>`).join('')}</div>`}
function donutChart(el,items,total,center){let start=0;const stops=[];items.forEach(x=>{const end=start+(Number(x.value||0)/Math.max(total,1))*100;stops.push(`${x.color} ${start}% ${end}%`);start=end});document.getElementById(el).innerHTML=`<div class="donutwrap"><div class="donut" style="background:conic-gradient(${stops.join(',')})"><div class="donutcenter">${center}</div></div><div class="legend">${items.map(x=>`<div class="legendrow"><span class="dot" style="background:${x.color}"></span><span>${esc(x.label)}</span><b>${qty(x.value)}</b></div>`).join('')}</div></div>`}
function actionTone(label){if(/Lệch|vượt|đứt|âm/i.test(label))return 'bad';if(/Bổ sung|Kiểm tra|thiếu|cần/i.test(label))return 'warn';return 'ok'}
function renderCharts(){donutChart('skuDonut',[{label:'Có tồn cả hai kho',value:s.overlap,color:'#12385b'},{label:'Chỉ Kho Tổng',value:s.only_main,color:'#2563eb'},{label:'Chỉ Kho POS',value:s.only_pos,color:'#16a34a'},{label:'Hết cả hai',value:s.both_zero,color:'#dc2626'}],s.sku_count,`${qty(s.sku_count)}<br><span style="font-size:12px;color:var(--muted)">SKU</span>`);const actions=data.rows.reduce((m,r)=>{m[r.action]=(m[r.action]||0)+1;return m},{});const actionItems=Object.entries(actions).sort((a,b)=>b[1]-a[1]).map(([label,value])=>({label,value,display:qty(value),cls:actionTone(label)}));barChart('actionChart',actionItems,Math.max(...actionItems.map(x=>x.value),1))}
renderCharts();function categoryOf(r){const t=(r.san_pham||'').toLowerCase();if(/chân gà|chan ga/.test(t))return 'Chân gà';if(/kẹo|bánh|thạch|socola|chocolate|alpenliebe/.test(t))return 'Bánh/Kẹo/Thạch';if(/snack|bim|mì|miếng|tăm cay/.test(t))return 'Snack/Mì ăn liền';if(/xúc xích|thịt|cá viên|thanh cua|cơm/.test(t))return 'Đồ ăn liền';if(/nước|trà|sữa|cafe|cà phê/.test(t))return 'Đồ uống';return 'Khác'}
let tableMaxValue=1;
function valueBar(v){const pctVal=Math.max(1,Number(v||0)/Math.max(tableMaxValue,1)*100);return `<div class="valuebar"><span class="valuebar-fill" style="width:${pctVal}%"></span><span class="valuebar-text">${money(v)}</span></div>`}function statusPill(r){const a=r.action||'';if(/Lệch|vượt|đứt|âm/i.test(a))return `<span class="pill bad">${a}</span>`;if(/Bổ sung|Kiểm tra|thiếu|cần/i.test(a))return `<span class="pill warn">${a}</span>`;if(r.status==='Chỉ Kho Tổng có tồn')return `<span class="pill info">Chỉ Tổng</span>`;if(r.status==='Chỉ Kho POS có tồn')return `<span class="pill pospill">Chỉ POS</span>`;if(r.status==='Hết tồn cả hai')return `<span class="pill bad">Hết cả hai</span>`;return `<span class="pill ok">Ổn</span>`}
function deltaClass(v){if(v>0)return 'delta-main';if(v<0)return 'delta-pos';return 'delta-zero'}
const cols=[{label:'SKU',key:'sku',cls:'sku-col',f:(v,r)=>`<div class="sku">${v}</div><div class="sub">${r.barcode||''}</div>`},{label:'Nhóm',key:'san_pham',cls:'group-col',f:(v,r)=>`<span class="groupCell">${categoryOf(r)}</span>`},{label:'Sản phẩm',key:'san_pham',cls:'product-col sep-right',f:(v,r)=>`<div class="product">${v}</div><div class="sub">${r.bien_the||''}</div>`},{label:'Tồn',key:'main_ton',cls:'main-col',num:true,f:qty},{label:'KD',key:'main_kha_dung',cls:'main-col',num:true,f:qty},{label:'Đặt',key:'main_dat',cls:'main-col sep-right',num:true,f:qty},{label:'Tồn',key:'pos_ton',cls:'pos-col',num:true,f:qty},{label:'KD',key:'pos_kha_dung',cls:'pos-col',num:true,f:qty},{label:'Đặt',key:'pos_dat',cls:'pos-col sep-right',num:true,f:qty},{label:'Lệch tồn',key:'diff_ton',cls:'diff-col',num:true,f:v=>`<span class="${deltaClass(v)}">${qty(v)}</span>`},{label:'Lệch KD',key:'diff_kha_dung',cls:'diff-col',num:true,f:v=>`<span class="${deltaClass(v)}">${qty(v)}</span>`},{label:'Giá trị tồn',key:'total_value',cls:'value-col',num:true,f:valueBar},{label:'Trạng thái',key:'status',cls:'status-col',f:(v,r)=>statusPill(r)}];
function table(rows){tableMaxValue=Math.max(...rows.map(r=>Number(r.total_value||0)),1);const colgroup=`<colgroup>${cols.map(c=>`<col class="${c.cls||''}">`).join('')}</colgroup>`;const groupHead=`<thead><tr class="thead-group"><th colspan="3" class="group-title sep-right">THÔNG TIN SKU</th><th colspan="3" class="group-title sep-right">KHO TỔNG MTB</th><th colspan="3" class="group-title group-pos sep-right">KHO POS</th><th colspan="2" class="group-title">CHÊNH LỆCH</th><th colspan="2" class="group-title">GIÁ TRỊ & TRẠNG THÁI</th></tr><tr class="thead-sub">${cols.map(c=>`<th class="${c.num?'num ':''}${c.cls||''}">${c.label}</th>`).join('')}</tr></thead>`;document.getElementById('mainTable').className='inventory-table';document.getElementById('mainTable').innerHTML=`${colgroup}${groupHead}<tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td class="${c.num?'num ':''}${c.cls||''}">${c.f?c.f(r[c.key],r):(r[c.key]??'')}</td>`).join('')}</tr>`).join('')}</tbody>`}
function baseRows(){if(currentView==='actions')return data.actions;if(currentView==='main')return data.topMain;if(currentView==='pos')return data.topPos;return data.rows}
function passFilter(r,f){if(f==='diff')return r.diff_ton!==0||r.diff_kha_dung!==0;if(f==='only_main')return r.main_ton>0&&r.pos_ton<=0;if(f==='only_pos')return r.main_ton<=0&&r.pos_ton>0;if(f==='pos_need')return r.pos_kha_dung<=0&&r.main_kha_dung>0;if(f==='main_need')return r.main_kha_dung<=0&&r.pos_kha_dung>0;if(f==='committed')return r.main_dat>0||r.pos_dat>0;return true}
function passWarehouse(r,w){if(w==='main')return r.main_ton>0||r.main_kha_dung>0||r.main_dat>0;if(w==='pos')return r.pos_ton>0||r.pos_kha_dung>0||r.pos_dat>0;return true}
function render(){const q=document.getElementById('search').value.toLowerCase().trim();const f=document.getElementById('statusFilter').value;const w=document.getElementById('warehouseFilter').value;const rows=baseRows().filter(r=>passWarehouse(r,w)).filter(r=>passFilter(r,f)).filter(r=>!q||[r.sku,r.barcode,r.san_pham,r.bien_the,categoryOf(r)].join(' ').toLowerCase().includes(q));table(rows)}
document.getElementById('search').addEventListener('input',render);document.getElementById('statusFilter').addEventListener('change',render);document.getElementById('warehouseFilter').addEventListener('change',render);
document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentView=b.dataset.view;render()}));
document.querySelectorAll('#quickTabs button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#quickTabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('statusFilter').value=b.dataset.preset;currentView='compare';document.querySelectorAll('.seg button').forEach(x=>x.classList.toggle('active',x.dataset.view==='compare'));render()}));
render();
</script>
