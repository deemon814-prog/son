/* Supply-chain dashboard layout */
:root{--olive:#59682f;--olive-dark:#203915;--olive-mid:#6d7f35;--dash-bg:#f2f2f0;--card-line:#d0d3ca}
body{background:var(--dash-bg);font-family:Inter,Roboto,"Segoe UI",Arial,sans-serif}
.dashboard-shell{max-width:1780px;margin:0 auto;padding:18px 82px 26px 22px}
.report-hero{position:sticky;top:0;z-index:30;background:var(--olive);border:1px solid rgba(33,48,22,.15);border-radius:18px;box-shadow:0 3px 8px rgba(17,24,39,.25);padding:24px 28px;margin-bottom:10px;text-align:center}
.report-hero h1{margin:0;color:#fff;font-size:30px;line-height:1.2;font-weight:850;letter-spacing:.01em}
.dashboard-layout{display:grid;grid-template-columns:292px minmax(0,1fr);gap:12px;align-items:start}
.dashboard-sidebar{position:sticky;top:96px;display:grid;gap:10px;padding:4px 0}
.side-kpis{display:grid;gap:10px}
.side-kpis .kpi{min-height:88px;border:0;border-radius:10px;background:var(--olive-dark);color:#fff;text-align:center;padding:14px 12px;box-shadow:0 1px 3px rgba(17,24,39,.22);overflow:visible}
.side-kpis .kpi:before{display:none}
.side-kpis .kpi.ok,.side-kpis .kpi.warn{background:var(--olive-dark)}
.side-kpis .kpi .label{color:#d9e1c7;font-size:12px;font-weight:700}
.side-kpis .kpi .value{color:#fff;font-size:clamp(23px,1.7vw,30px);line-height:1.12;margin-top:5px;font-weight:850;white-space:normal;overflow-wrap:anywhere}
.side-kpis .kpi .hint{color:#d9e1c7;font-size:11px;margin-top:4px;white-space:normal;overflow-wrap:anywhere}
.filter-card{background:var(--olive-dark);border-radius:8px;padding:10px 12px;color:#fff;box-shadow:0 1px 3px rgba(17,24,39,.2)}
.filter-card label{display:block;margin-bottom:6px;font-size:12px;color:#d9e1c7;font-weight:800}
.filter-card input,.filter-card select{width:100%;min-width:0;height:34px;border-radius:2px;border:1px solid rgba(230,238,214,.45);background:#2b451d;color:#fff;padding:6px 8px}
.filter-card input::placeholder{color:#c7d1b7}
.filter-card option{background:#fff;color:#111827}
.status-filter{padding-bottom:12px}
.status-filter .status-tabs{display:grid;gap:7px;width:100%;padding:0}
.status-filter .status-tabs button{justify-content:space-between;display:flex;align-items:center;width:100%;min-height:32px;height:auto;border-radius:4px;border-color:rgba(230,238,214,.42);background:#2b451d;color:#fff;padding:7px 9px;text-align:left;gap:8px;line-height:1.25}
.status-filter .status-tabs .tab-label{flex:1;min-width:0}
.status-filter .status-tabs button.active{background:#e9efdc;color:#203915;border-color:#e9efdc}
.status-filter .status-tabs .count{color:inherit;margin-left:8px;white-space:nowrap}
.dashboard-main{max-width:none;margin:0;padding:0}
.analysis-grid{display:grid;grid-template-columns:repeat(2,minmax(300px,1fr));gap:12px}
.analysis-grid .card,.table-card{border:1px solid var(--card-line);border-radius:10px;background:#fff;box-shadow:0 1px 5px rgba(17,24,39,.13);padding:14px}
.analysis-grid h2,.table-card h2{text-align:center;margin:0 0 10px;color:#1f2937;font-size:14px;font-weight:850}
.chart-card{min-height:242px}
.chart-card .chart{min-height:190px}
.warehouse-card{grid-column:2;grid-row:1 / span 2}
.action-card{grid-column:1;display:flex;flex-direction:column;min-height:360px}
.action-card #actionChart{min-height:205px}
.atp-panel{margin-top:auto;padding-top:14px;border-top:1px solid #e4e8dc}
.atp-panel h2{margin-bottom:8px}
.atp-panel .atp-chart{min-height:86px}
.atp-panel .chartbars{gap:8px}
.atp-panel .chartrow{grid-template-columns:150px 1fr 72px}
.atp-panel .charttrack{height:18px}
.donutwrap{justify-content:center;gap:16px;min-height:188px}
.donut{width:150px;height:150px;box-shadow:inset 0 0 0 16px rgba(255,255,255,.78)}
.donutcenter{width:86px;height:86px;font-size:18px}
.legendrow{font-size:12px}
.chartrow{grid-template-columns:142px 1fr 76px;gap:8px}
.charttrack{height:20px;background:#eef0ea;border-radius:2px}
.chartfill{background:var(--olive)}
.chartfill.ok{background:#7c8f3e}.chartfill.pos{background:#8b9f52}.chartfill.warn{background:#d59a2e}.chartfill.bad{background:#c33a32}
.chartvalue{font-size:12px}
.warehouse-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.warehouse-summary .whbox{border:1px solid #d9dece;border-radius:8px;padding:10px;background:#fafbf7}
.warehouse-summary .whbox.pos{background:#f4f8ee}
.warehouse-summary .whname{font-size:12px;color:#203915;font-weight:850;margin-bottom:8px}
.warehouse-summary .whstats{grid-template-columns:repeat(2,1fr);gap:6px}
.warehouse-summary .stat{border:1px solid #e2e6d9;background:#fff;border-radius:5px;padding:6px}
.warehouse-summary .stat span{font-size:10px}

.table-card{margin-top:12px;padding:0;overflow:hidden}

const fmt=new Intl.NumberFormat('vi-VN');
const qty=n=>fmt.format(Math.round(Number(n||0)));
const money=n=>fmt.format(Math.round(Number(n||0)))+'₫';
const pct=n=>(Number(n||0)).toLocaleString('vi-VN',{maximumFractionDigits:1})+'%';
const s=data.summary;

let currentRows=[];
const LARGE_DIFF_MIN_QTY=300;
function accountingValue(r){return Math.max(0,Number(r.total_value||0))}
function hasNegativeStock(r){return [r.main_ton,r.main_kha_dung,r.pos_ton,r.pos_kha_dung,r.total_value].some(v=>Number(v||0)<0)}
function isLargeDiff(r){return Math.max(Math.abs(Number(r.diff_ton||0)),Math.abs(Number(r.diff_kha_dung||0)))>=LARGE_DIFF_MIN_QTY}
function effectiveAction(r){if(hasNegativeStock(r))return 'Tồn âm cần kiểm kho';if(r.pos_kha_dung<=0&&r.main_kha_dung>0)return 'Kho POS hết hàng cần bổ sung';if(r.main_kha_dung<=0&&r.pos_kha_dung>0)return 'Kho tổng hết hàng cần bổ sung';if(isLargeDiff(r))return 'Lệch tồn lớn';return r.action&&r.action!=='Ổn'?r.action:'Ổn'}

function kpi(label,value,hint,tone='brand'){return `<div class="card kpi ${tone}"><div class="label">${label}</div><div class="value">${value}</div><div class="hint">${hint||''}</div></div>`}
const totalInventoryValue=data.rows.reduce((sum,r)=>sum+accountingValue(r),0);
const posNeedCount=data.rows.filter(r=>r.pos_kha_dung<=0&&r.main_kha_dung>0&&!hasNegativeStock(r)).length;
const mainAtp=s.main.ton?s.main.kha_dung/s.main.ton*100:0;
const posAtp=s.pos.ton?s.pos.kha_dung/s.pos.ton*100:0;
document.getElementById('kpis').innerHTML=[kpi('Tổng giá trị tồn',money(totalInventoryValue),'Kho Tổng MTB + Kho POS','brand'),kpi('ATP - hàng sẵn sàng bán',`Tổng ${pct(mainAtp)} · POS ${pct(posAtp)}`,'Khả dụng / tồn hiện có','ok'),kpi('SKU cần nhập gấp',qty(posNeedCount),'POS đứt hàng nhưng Kho Tổng còn tồn','warn')].join('');
function whBox(x,type){return `<div class="whbox ${type}"><div class="whname">${x.kho}</div><div class="whstats"><div class="stat"><span>SKU</span><b>${qty(x.skus)}</b></div><div class="stat"><span>Tồn</span><b>${qty(x.ton)}</b></div><div class="stat"><span>Khả dụng</span><b>${qty(x.kha_dung)}</b></div><div class="stat"><span>Đã đặt</span><b>${qty(x.dat)}</b></div><div class="stat"><span>Chờ nhập</span><b>${qty(x.cho_nhap)}</b></div><div class="stat"><span>Giá bán tồn</span><b>${money(x.tong_gia_ban)}</b></div><div class="stat"><span>Lợi nhuận</span><b>${money(x.tong_loi_nhuan)}</b></div><div class="stat"><span>Khả dụng/Tồn</span><b>${pct(x.ty_le_kha_dung)}</b></div></div></div>`}
const warehouseSummaryEl=document.getElementById('warehouseSummary');if(warehouseSummaryEl)warehouseSummaryEl.innerHTML=whBox(s.main,'main')+whBox(s.pos,'pos');
function bars(el,items,max,colorClass=''){const target=document.getElementById(el);if(!target)return;target.innerHTML=items.map(x=>`<div class="barrow"><div class="barlabel" title="${x.label}">${x.label}</div><div class="bartrack"><div class="bar ${colorClass}" style="width:${Math.max(1,x.value/max*100)}%"></div></div><div class="barvalue num">${x.display}</div></div>`).join('')}
bars('stockBars',[{label:'Có tồn cả hai kho',value:s.overlap,display:qty(s.overlap)},{label:'Chỉ Kho Tổng có tồn',value:s.only_main,display:qty(s.only_main)},{label:'Chỉ Kho POS có tồn',value:s.only_pos,display:qty(s.only_pos)},{label:'Hết tồn cả hai',value:s.both_zero,display:qty(s.both_zero)}],Math.max(s.overlap,s.only_main,s.only_pos,s.both_zero,1));
bars('valueBars',[{label:'Kho Tổng MTB',value:s.main.tong_gia_ban,display:money(s.main.tong_gia_ban)},{label:'Kho POS MTB',value:s.pos.tong_gia_ban,display:money(s.pos.tong_gia_ban)}],Math.max(s.main.tong_gia_ban,s.pos.tong_gia_ban,1),'pos');
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function barChart(el,items,max){document.getElementById(el).innerHTML=`<div class="chartbars">${items.map(x=>`<div class="chartrow"><div class="chartlabel" title="${esc(x.label)}">${esc(x.label)}</div><div class="charttrack"><div class="chartfill ${x.cls||''}" style="width:${Math.max(1,Number(x.value||0)/max*100)}%"></div></div><div class="chartvalue">${x.display}</div></div>`).join('')}</div>`}
function donutChart(el,items,total,center){let start=0;const stops=[];items.forEach(x=>{const end=start+(Number(x.value||0)/Math.max(total,1))*100;stops.push(`${x.color} ${start}% ${end}%`);start=end});document.getElementById(el).innerHTML=`<div class="donutwrap"><div class="donut" style="background:conic-gradient(${stops.join(',')})"><div class="donutcenter">${center}</div></div><div class="legend">${items.map(x=>`<div class="legendrow"><span class="dot" style="background:${x.color}"></span><span>${esc(x.label)}</span><b>${qty(x.value)}</b></div>`).join('')}</div></div>`}
function actionTone(label){if(/Lệch|vượt|đứt|âm/i.test(label))return 'bad';if(/Bổ sung|Kiểm tra|thiếu|cần/i.test(label))return 'warn';return 'ok'}
function renderCharts(){donutChart('skuDonut',[{label:'Có tồn cả hai kho',value:s.overlap,color:'#59682f'},{label:'Chỉ Kho Tổng',value:s.only_main,color:'#7c8f3e'},{label:'Chỉ Kho POS',value:s.only_pos,color:'#9bab64'},{label:'Hết cả hai',value:s.both_zero,color:'#c33a32'}],s.sku_count,`${qty(s.sku_count)}<br><span style="font-size:12px;color:var(--muted)">SKU</span>`);barChart('atpChart',[{label:'Kho Tổng MTB',value:mainAtp,display:pct(mainAtp),cls:'ok'},{label:'Kho POS',value:posAtp,display:pct(posAtp),cls:'pos'}],100);const actions=data.rows.reduce((m,r)=>{const key=effectiveAction(r);m[key]=(m[key]||0)+1;return m},{});const actionItems=Object.entries(actions).sort((a,b)=>b[1]-a[1]).map(([label,value])=>({label,value,display:qty(value),cls:actionTone(label)}));barChart('actionChart',actionItems,Math.max(...actionItems.map(x=>x.value),1))}
renderCharts();function categoryOf(r){const t=(r.san_pham||'').toLowerCase();if(/chân gà|chan ga/.test(t))return 'Chân gà';if(/kẹo|bánh|thạch|socola|chocolate|alpenliebe/.test(t))return 'Bánh/Kẹo/Thạch';if(/snack|bim|mì|miếng|tăm cay/.test(t))return 'Snack/Mì ăn liền';if(/xúc xích|thịt|cá viên|thanh cua|cơm/.test(t))return 'Đồ ăn liền';if(/nước|trà|sữa|cafe|cà phê/.test(t))return 'Đồ uống';return 'Khác'}
function formatProduct(r){let name=String(r.san_pham||'').replace(/\s+/g,' ').trim();const locked=/^\s*\[?\s*khóa\s*\]?\s*/i.test(name);name=name.replace(/^\s*\[?\s*khóa\s*\]?\s*/i,'').trim();const meta=[];name=name.replace(/\(([^)]*)\)/g,(m,p)=>{const clean=p.replace(/\s+/g,' ').trim();if(clean)meta.push(clean);return ' '});name=name.replace(/\s+/g,' ').trim();const variant=String(r.bien_the||'').replace(/Default Title/gi,'').replace(/\s+/g,' ').trim();if(variant)meta.push(variant);return `${locked?'<span class="lock-tag">Khóa</span>':''}<span class="product-main">${name}</span><span class="product-meta">${meta.join(' · ')}</span>`}let tableMaxValue=1;
function qtyCell(v){const n=Number(v||0);return n<0?`<span class="negative-number">(${qty(Math.abs(n))})</span>`:qty(n)}
function valueBar(v,r){const raw=Number(v||0);const display=accountingValue(r);const pctVal=display<=0?0:Math.max(1,display/Math.max(tableMaxValue,1)*100);return `<div class="valuebar ${raw<0?'negative':''}"><span class="valuebar-fill" style="width:${pctVal}%"></span><span class="valuebar-text">${money(display)}${raw<0?'<span class="value-note">Tồn âm</span>':''}</span></div>`}function statusPill(r){const a=effectiveAction(r);if(/Lệch|vượt|đứt|âm/i.test(a))return `<span class="pill bad">${a}</span>`;if(/Bổ sung|Kiểm tra|thiếu|cần/i.test(a))return `<span class="pill warn">${a}</span>`;if(r.status==='Chỉ Kho Tổng có tồn')return `<span class="pill info">Chỉ Tổng</span>`;if(r.status==='Chỉ Kho POS có tồn')return `<span class="pill pospill">Chỉ POS</span>`;if(r.status==='Hết tồn cả hai')return `<span class="pill bad">Hết cả hai</span>`;return `<span class="pill neutral">Ổn</span>`}
function deltaClass(v){if(v>0)return 'delta-main';if(v<0)return 'delta-pos';return 'delta-zero'}
function diffCell(v){const direction=v>0?'Tổng > POS':v<0?'POS > Tổng':'Khớp';return `<span class="diff-cell ${deltaClass(v)}"><span class="diff-value">${qty(Math.abs(Number(v||0)))}</span><span class="diff-direction">${direction}</span></span>`}
function rowClass(r){const a=effectiveAction(r);if(/Lệch|vượt|đứt|âm/i.test(a))return 'row-risk';if(/Bổ sung|Kiểm tra|thiếu|cần/i.test(a))return 'row-warn';return 'row-ok'}
function quickAction(r){const sku=esc(r.sku);const a=effectiveAction(r);if(hasNegativeStock(r))return `<button type="button" class="quick-action risk" data-sku="${sku}">Yêu cầu kiểm kho</button>`;if(r.pos_kha_dung<=0&&r.main_kha_dung>0)return `<button type="button" class="quick-action warn" data-sku="${sku}">Tạo chuyển kho</button>`;if(r.main_kha_dung<=0&&r.pos_kha_dung>0)return `<button type="button" class="quick-action warn" data-sku="${sku}">Tạo phiếu bù</button>`;if(/Lệch|vượt|đứt|âm/i.test(a))return `<button type="button" class="quick-action risk" data-sku="${sku}">Kiểm tra</button>`;return `<button type="button" class="quick-action muted" data-sku="${sku}">Đã ổn</button>`}
const cols=[{label:'STT',key:'stt',cls:'stt-col',f:(v,r,i)=>qty(i+1)},{label:'SKU',key:'sku',cls:'sku-col',f:(v,r)=>`<div class="sku">${v}</div><div class="sub">${r.barcode||''}</div>`},{label:'Nhóm',key:'san_pham',cls:'group-col',f:(v,r)=>`<span class="groupCell">${categoryOf(r)}</span>`},{label:'Sản phẩm',key:'san_pham',cls:'product-col sep-right',f:(v,r)=>formatProduct(r)},{label:'Tồn',key:'main_ton',cls:'main-col',num:true,f:qtyCell},{label:'KD',key:'main_kha_dung',cls:'main-col',num:true,f:qtyCell},{label:'Đặt',key:'main_dat',cls:'main-col sep-right',num:true,f:qtyCell},{label:'Tồn',key:'pos_ton',cls:'pos-col',num:true,f:qtyCell},{label:'KD',key:'pos_kha_dung',cls:'pos-col',num:true,f:qtyCell},{label:'Đặt',key:'pos_dat',cls:'pos-col sep-right',num:true,f:qtyCell},{label:'Tồn',key:'diff_ton',cls:'diff-col',num:true,f:diffCell},{label:'KD',key:'diff_kha_dung',cls:'diff-col',num:true,f:diffCell},{label:'Giá trị tồn',key:'total_value',cls:'value-col',num:true,f:valueBar},{label:'Trạng thái',key:'status',cls:'status-col',f:(v,r)=>statusPill(r)},{label:'Thao tác',key:'action',cls:'action-col',f:(v,r)=>quickAction(r)}];
function table(rows){tableMaxValue=Math.max(...rows.map(r=>accountingValue(r)),1);const colgroup=`<colgroup>${cols.map(c=>`<col class="${c.cls||''}">`).join('')}</colgroup>`;const groupHead=`<thead><tr class="thead-group"><th colspan="4" class="group-title sep-right">THÔNG TIN SKU</th><th colspan="3" class="group-title group-main sep-right">KHO TỔNG MTB</th><th colspan="3" class="group-title group-pos sep-right">KHO POS</th><th colspan="2" class="group-title">LỆCH TỔNG VS POS</th><th colspan="3" class="group-title">GIÁ TRỊ & XỬ LÝ</th></tr><tr class="thead-sub">${cols.map(c=>`<th class="${c.num?'num ':''}${c.cls||''}">${c.label}</th>`).join('')}</tr></thead>`;document.getElementById('mainTable').className='inventory-table';document.getElementById('mainTable').innerHTML=`${colgroup}${groupHead}<tbody>${rows.map((r,i)=>`<tr class="${rowClass(r)}">${cols.map(c=>`<td class="${c.num?'num ':''}${c.cls||''}">${c.f?c.f(r[c.key],r,i):(r[c.key]??'')}</td>`).join('')}</tr>`).join('')}</tbody>`}
function baseRows(){if(currentStatus!=='all')return data.rows;if(currentView==='actions')return data.rows.filter(r=>effectiveAction(r)!=='Ổn');if(currentView==='main')return data.topMain||data.rows;if(currentView==='pos')return data.topPos||data.rows;return data.rows}
function passFilter(r,f){if(f==='negative')return hasNegativeStock(r);if(f==='diff_large')return isLargeDiff(r)&&!hasNegativeStock(r);if(f==='diff')return r.diff_ton!==0||r.diff_kha_dung!==0;if(f==='only_main')return r.main_ton>0&&r.pos_ton<=0;if(f==='only_pos')return r.main_ton<=0&&r.pos_ton>0;if(f==='pos_need')return r.pos_kha_dung<=0&&r.main_kha_dung>0&&!hasNegativeStock(r);if(f==='main_need')return r.main_kha_dung<=0&&r.pos_kha_dung>0&&!hasNegativeStock(r);if(f==='committed')return r.main_dat>0||r.pos_dat>0;return true}
function passWarehouse(r,w){if(w==='main')return r.main_ton>0||r.main_kha_dung>0||r.main_dat>0;if(w==='pos')return r.pos_ton>0||r.pos_kha_dung>0||r.pos_dat>0;return true}
const statusTabDefs=[{id:'all',label:'Tất cả',tone:'',count:()=>data.rows.length},{id:'negative',label:'Tồn âm',tone:'danger',count:()=>data.rows.filter(r=>passFilter(r,'negative')).length},{id:'pos_need',label:'Kho POS hết hàng cần bổ sung',tone:'warn',count:()=>data.rows.filter(r=>passFilter(r,'pos_need')).length},{id:'main_need',label:'Kho tổng hết hàng cần bổ sung',tone:'warn',count:()=>data.rows.filter(r=>passFilter(r,'main_need')).length}];
function renderStatusTabs(){document.getElementById('statusTabs').innerHTML=statusTabDefs.map(t=>`<button type="button" class="${t.tone||''} ${currentStatus===t.id?'active':''}" data-status="${t.id}"><span class="tab-label">${t.label}</span><span class="count">(${qty(t.count())})</span></button>`).join('');document.querySelectorAll('#statusTabs button').forEach(b=>b.addEventListener('click',()=>{currentStatus=b.dataset.status;renderStatusTabs();render()}))}
function filteredRows(){const q=document.getElementById('search').value.toLowerCase().trim();const w=document.getElementById('warehouseFilter').value;return baseRows().filter(r=>passWarehouse(r,w)).filter(r=>passFilter(r,currentStatus)).filter(r=>!q||[r.sku,r.barcode,r.san_pham,r.bien_the,categoryOf(r)].join(' ').toLowerCase().includes(q))}
function render(){currentRows=filteredRows();table(currentRows)}
function csvCell(v){const text=String(v??'').replace(/\r?\n|\r/g,' ').replace(/"/g,'""');return /[",\n]/.test(text)?`"${text}"`:text}
function exportCsv(){const rows=currentRows.length?currentRows:filteredRows();const headers=['STT','SKU','Barcode','Nhóm','Sản phẩm','Biến thể','Kho Tổng - Tồn','Kho Tổng - Khả dụng','Kho Tổng - Đặt','Kho Tổng - Chờ nhập','Kho Tổng - Giá trị','Kho POS - Tồn','Kho POS - Khả dụng','Kho POS - Đặt','Kho POS - Chờ nhập','Kho POS - Giá trị','Lệch tồn','Lệch khả dụng','Tổng tồn','Tổng khả dụng','Tổng giá trị','Trạng thái','Thao tác'];const body=rows.map((r,i)=>[i+1,r.sku,r.barcode,categoryOf(r),r.san_pham,r.bien_the,r.main_ton,r.main_kha_dung,r.main_dat,r.main_cho_nhap,accountingValue(r),r.pos_ton,r.pos_kha_dung,r.pos_dat,r.pos_cho_nhap,r.pos_value,r.diff_ton,r.diff_kha_dung,r.total_ton,r.total_kha_dung,accountingValue(r),effectiveAction(r),r.action].map(csvCell).join(','));const csv='\ufeff'+[headers.map(csvCell).join(','),...body].join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const stamp=new Date().toISOString().slice(0,10);a.href=url;a.download=`chi-tiet-sku-${currentView}-${currentStatus}-${stamp}.csv`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
document.getElementById('search').addEventListener('input',render);document.getElementById('warehouseFilter').addEventListener('change',render);
document.getElementById('exportCsv').addEventListener('click',exportCsv);
document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentView=b.dataset.view;render()}));
document.getElementById('mainTable').addEventListener('click',e=>{const btn=e.target.closest('.quick-action');if(!btn||btn.classList.contains('muted'))return;btn.textContent='Đã ghi nhận';btn.className='quick-action muted'});
renderStatusTabs();
render();
</script>
</body>
</html>
