/* Supply-chain dashboard layout */
:root{--olive:#59682f;--olive-dark:#203915;--olive-mid:#6d7f35;--dash-bg:#f2f2f0;--card-line:#d0d3ca}
body{background:var(--dash-bg);font-family:Inter,Roboto,"Segoe UI",Arial,sans-serif}
.dashboard-shell{max-width:1780px;margin:0 auto;padding:18px 82px 26px 22px}
.report-hero{position:sticky;top:0;z-index:30;background:var(--olive);border:1px solid rgba(33,48,22,.15);border-radius:18px;box-shadow:0 3px 8px rgba(17,24,39,.25);padding:24px 28px;margin-bottom:10px;text-align:center}
.report-hero h1{margin:0;color:#fff;font-size:30px;line-height:1.2;font-weight:850;letter-spacing:.01em}
.title-update{display:block;margin-top:5px;color:#e8efd8;font-size:13px;font-weight:650;line-height:1.25}
.dashboard-layout{display:grid;grid-template-columns:292px minmax(0,1fr);gap:12px;align-items:start}
.dashboard-sidebar{position:sticky;top:96px;display:grid;gap:10px;padding:4px 0}
.side-kpis{display:grid;gap:10px}
.side-kpis .kpi{min-height:88px;border:0;border-radius:10px;background:var(--olive-dark);color:#fff;text-align:center;padding:14px 12px;box-shadow:0 1px 3px rgba(17,24,39,.22);overflow:visible}
.side-kpis .kpi:before{display:none}
.side-kpis .kpi.ok,.side-kpis .kpi.warn{background:var(--olive-dark)}
.side-kpis .kpi .label{color:#d9e1c7;font-size:12px;font-weight:700}
.side-kpis .kpi .value{color:#fff;font-size:clamp(23px,1.7vw,30px);line-height:1.12;margin-top:5px;font-weight:850;white-space:normal;overflow-wrap:anywhere}
.side-kpis .kpi .hint{color:#d9e1c7;font-size:11px;margin-top:4px;white-space:normal;overflow-wrap:anywhere}
.filter-card{background:var(--olive-dark);border-radius:8px;padding:10px 12px;color:#fff;box-shadow:0 1px 3px rgba(17,24,39,.2)}
.filter-card label{display:block;margin-bottom:6px;font-size:12px;color:#d9e1c7;font-weight:800}
.filter-card input,.filter-card select{width:100%;min-width:0;height:34px;border-radius:2px;border:1px solid rgba(230,238,214,.45);background:#2b451d;color:#fff;padding:6px 8px}
.filter-card input::placeholder{color:#c7d1b7}
.filter-card option{background:#fff;color:#111827}
.status-filter{padding-bottom:12px}
.status-filter .status-tabs{display:grid;gap:7px;width:100%;padding:0}
.status-filter .status-tabs button{justify-content:space-between;display:flex;align-items:center;width:100%;min-height:32px;height:auto;border-radius:4px;border-color:rgba(230,238,214,.42);background:#2b451d;color:#fff;padding:7px 9px;text-align:left;gap:8px;line-height:1.25}
.status-filter .status-tabs .tab-label{flex:1;min-width:0}
.status-filter .status-tabs button.active{background:#e9efdc;color:#203915;border-color:#e9efdc}
.status-filter .status-tabs .count{color:inherit;margin-left:8px;white-space:nowrap}
.dashboard-main{max-width:none;margin:0;padding:0}
.analysis-grid{display:grid;grid-template-columns:repeat(2,minmax(300px,1fr));gap:12px}
.analysis-grid .card,.table-card{border:1px solid var(--card-line);border-radius:10px;background:#fff;box-shadow:0 1px 5px rgba(17,24,39,.13);padding:14px}
.analysis-grid h2,.table-card h2{text-align:center;margin:0 0 10px;color:#1f2937;font-size:14px;font-weight:850}
.chart-card{min-height:242px}
.chart-card .chart{min-height:190px}
.warehouse-card{grid-column:2;grid-row:1 / span 2}
.action-card{grid-column:1;display:flex;flex-direction:column;min-height:360px}
.action-card #actionChart{min-height:205px}
.atp-panel{margin-top:auto;padding-top:14px;border-top:1px solid #e4e8dc}
.atp-panel h2{margin-bottom:8px}
.atp-panel .atp-chart{min-height:86px}
.atp-panel .chartbars{gap:8px}
.atp-panel .chartrow{grid-template-columns:150px 1fr 72px}
.atp-panel .charttrack{height:18px}
.donutwrap{justify-content:center;gap:16px;min-height:188px}
.donut{width:150px;height:150px;box-shadow:inset 0 0 0 16px rgba(255,255,255,.78)}
.donutcenter{width:86px;height:86px;font-size:18px}
.legendrow{font-size:12px}
.chartrow{grid-template-columns:142px 1fr 76px;gap:8px}
.charttrack{height:20px;background:#eef0ea;border-radius:2px}
.chartfill{background:var(--olive)}
.chartfill.ok{background:#7c8f3e}.chartfill.pos{background:#8b9f52}.chartfill.warn{background:#d59a2e}.chartfill.bad{background:#c33a32}
.chartvalue{font-size:12px}

const fmt=new Intl.NumberFormat('vi-VN');
const qty=n=>fmt.format(Math.round(Number(n||0)));
const money=n=>fmt.format(Math.round(Number(n||0)))+'₫';
const pct=n=>(Number(n||0)).toLocaleString('vi-VN',{maximumFractionDigits:1})+'%';
const s=data.summary;
let currentView='compare';
let currentUnit='base';
let currentStatus='all';
let tableDensity='compact';
let currentRows=[];
const LARGE_DIFF_MIN_QTY=300;
function accountingValue(r){return Math.max(0,Number(r.total_value||0))}
function hasNegativeStock(r){return [r.main_ton,r.main_kha_dung,r.pos_ton,r.pos_kha_dung,r.total_value].some(v=>Number(v||0)<0)}
function isLargeDiff(r){return Math.max(Math.abs(Number(r.diff_ton||0)),Math.abs(Number(r.diff_kha_dung||0)))>=LARGE_DIFF_MIN_QTY}
function effectiveAction(r){if(hasNegativeStock(r))return 'Tồn âm cần kiểm kho';if(r.pos_kha_dung<=0&&r.main_kha_dung>0)return 'Kho POS hết hàng cần bổ sung';if(r.main_kha_dung<=0&&r.pos_kha_dung>0)return 'Kho tổng hết hàng cần bổ sung';if(isLargeDiff(r))return 'Lệch tồn lớn';return r.action&&r.action!=='Ổn'?r.action:'Ổn'}

function kpi(label,value,hint,tone='brand'){return `<div class="card kpi ${tone}"><div class="label">${label}</div><div class="value">${value}</div><div class="hint">${hint||''}</div></div>`}
const totalInventoryValue=data.rows.reduce((sum,r)=>sum+accountingValue(r),0);
const posNeedCount=data.rows.filter(r=>r.pos_kha_dung<=0&&r.main_kha_dung>0&&!hasNegativeStock(r)).length;
const mainAtp=s.main.ton?s.main.kha_dung/s.main.ton*100:0;
const posAtp=s.pos.ton?s.pos.kha_dung/s.pos.ton*100:0;
document.getElementById('kpis').innerHTML=[kpi('Tổng giá trị tồn',money(totalInventoryValue),'Kho Tổng MTB + Kho POS','brand'),kpi('ATP - hàng sẵn sàng bán',`Tổng ${pct(mainAtp)} · POS ${pct(posAtp)}`,'Khả dụng / tồn hiện có','ok'),kpi('SKU cần nhập gấp',qty(posNeedCount),'POS đứt hàng nhưng Kho Tổng còn tồn','warn')].join('');
function whBox(x,type){return `<div class="whbox ${type}"><div class="whname">${x.kho}</div><div class="whstats"><div class="stat"><span>SKU</span><b>${qty(x.skus)}</b></div><div class="stat"><span>Tồn</span><b>${qty(x.ton)}</b></div><div class="stat"><span>Khả dụng</span><b>${qty(x.kha_dung)}</b></div><div class="stat"><span>Đã đặt</span><b>${qty(x.dat)}</b></div><div class="stat"><span>Chờ nhập</span><b>${qty(x.cho_nhap)}</b></div><div class="stat"><span>Giá bán tồn</span><b>${money(x.tong_gia_ban)}</b></div><div class="stat"><span>Lợi nhuận</span><b>${money(x.tong_loi_nhuan)}</b></div><div class="stat"><span>Khả dụng/Tồn</span><b>${pct(x.ty_le_kha_dung)}</b></div></div></div>`}
const warehouseSummaryEl=document.getElementById('warehouseSummary');if(warehouseSummaryEl)warehouseSummaryEl.innerHTML=whBox(s.main,'main')+whBox(s.pos,'pos');
